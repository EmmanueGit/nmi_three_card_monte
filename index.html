<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMi Booth — Three Card Monte</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --nmi-navy: #0a1628;
    --nmi-navy-mid: #112040;
    --nmi-navy-light: #1a3260;
    --nmi-orange: #f47920;
    --nmi-orange-light: #ff9a45;
    --nmi-white: #ffffff;
    --nmi-gray: #8899bb;
    --nmi-silver: #d0daf0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }

  body {
    min-height: 100vh;
    background: var(--nmi-navy);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(244,121,32,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,121,32,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: ''; position: fixed; top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(244,121,32,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .game-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 780px;
    padding: 1.5rem 1.5rem 1rem;
    display: flex; flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  .logo-area { display: flex; align-items: center; gap: 14px; margin-bottom: 0.4rem; }
  .logo-svg { height: 52px; width: auto; }
  .divider-v { width: 1.5px; height: 38px; background: rgba(244,121,32,0.4); }
  .booth-label .top {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.25em; color: var(--nmi-orange);
    text-transform: uppercase; display: block;
  }
  .booth-label .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 900;
    color: var(--nmi-white); letter-spacing: 0.04em; line-height: 1;
  }
  .orange-line { width: 50px; height: 3px; background: var(--nmi-orange); border-radius: 2px; margin: 0.45rem 0 0.25rem; }
  .tagline { font-size: 11px; color: var(--nmi-gray); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500; margin-bottom: 0.9rem; }

  /* DIFFICULTY BADGE */
  .diff-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 0.75rem;
  }
  .diff-label { font-size: 11px; color: var(--nmi-gray); letter-spacing: 0.1em; text-transform: uppercase; }
  .diff-pip {
    width: 10px; height: 10px; border-radius: 2px;
    background: rgba(255,255,255,0.1);
    transition: background 0.3s;
  }
  .diff-pip.lit-1 { background: #4cde9f; }
  .diff-pip.lit-2 { background: #f4c430; }
  .diff-pip.lit-3 { background: #f47920; }
  .diff-pip.lit-4 { background: #ff5555; }
  .diff-pip.lit-5 { background: #cc22cc; }
  .diff-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    min-width: 72px;
    transition: color 0.3s;
  }

  /* PHASE STRIP */
  .phase-strip {
    display: flex; align-items: center; gap: 0;
    margin-bottom: 0.75rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(244,121,32,0.2);
    border-radius: 8px; overflow: hidden;
  }
  .phase-step {
    padding: 0.4rem 1rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--nmi-gray);
    transition: background 0.3s, color 0.3s;
    display: flex; align-items: center; gap: 6px;
  }
  .phase-step.active { background: rgba(244,121,32,0.18); color: var(--nmi-orange); }
  .phase-step.done   { color: #4cde9f; }
  .phase-sep { width: 1px; height: 28px; background: rgba(244,121,32,0.2); }
  .phase-num {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(244,121,32,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--nmi-orange); flex-shrink: 0;
  }
  .phase-step.done .phase-num { background: rgba(76,222,159,0.15); color: #4cde9f; }

  /* INSTRUCTION BANNER */
  .instruction-banner {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 19px; font-weight: 700;
    letter-spacing: 0.05em; color: var(--nmi-white);
    margin-bottom: 1rem; text-align: center;
    min-height: 26px; transition: opacity 0.3s;
  }
  .instruction-banner span { color: var(--nmi-orange); }
  .instruction-banner .warn { color: #ff5555; }

  /* COUNTDOWN TIMER BAR */
  .timer-bar-wrap {
    width: 100%; max-width: 420px;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    margin-bottom: 0.75rem;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .timer-bar-wrap.visible { opacity: 1; }
  .timer-bar {
    height: 100%; width: 100%;
    background: var(--nmi-orange);
    border-radius: 3px;
    transform-origin: left;
    transition: background 0.5s;
  }

  /* CARD TABLE */
  .card-table {
    position: relative;
    width: 100%;
    height: 200px;
    margin-bottom: 1.1rem;
    display: flex; align-items: center; justify-content: center;
  }

  .monte-card {
    position: absolute;
    cursor: default;
    user-select: none;
    z-index: 2;
  }

  .monte-card.clickable { cursor: pointer; }
  .monte-card.clickable:hover .card-inner-3d { transform: translateY(-10px); filter: brightness(1.12); }

  .card-inner-3d {
    width: 100%; height: 100%;
    position: relative; transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), filter 0.2s;
  }

  .monte-card.flipped .card-inner-3d { transform: rotateY(180deg); }
  .monte-card.flipped.clickable:hover .card-inner-3d { transform: rotateY(180deg) translateY(-10px); }

  .c-face, .c-back {
    position: absolute; inset: 0;
    border-radius: 12px; backface-visibility: hidden;
  }

  .c-face {
    background: #fff; border: 2px solid #ddd;
    display: flex; flex-direction: column;
    justify-content: space-between; padding: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: rotateY(180deg);
  }
  .c-face.red { color: #cc2222; }
  .c-face.black { color: #111; }

  .c-corner { display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .c-rank { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; line-height: 1; }
  .c-suit-sm { font-size: 14px; line-height: 1; }
  .c-corner-b { transform: rotate(180deg); align-self: flex-end; }
  .c-center { display: flex; align-items: center; justify-content: center; flex: 1; }
  .c-suit-lg { font-size: 52px; line-height: 1; }

  .c-back {
    background: var(--nmi-navy-mid);
    border: 2px solid var(--nmi-orange);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden;
  }
  .c-back-inner {
    width: calc(100% - 12px); height: calc(100% - 12px);
    border: 1.5px solid rgba(244,121,32,0.3); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    background-image:
      repeating-linear-gradient(45deg, rgba(244,121,32,0.06) 0px, rgba(244,121,32,0.06) 1px, transparent 1px, transparent 8px),
      repeating-linear-gradient(-45deg, rgba(244,121,32,0.06) 0px, rgba(244,121,32,0.06) 1px, transparent 1px, transparent 8px);
  }
  .c-back-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 0.05em; text-align: center; line-height: 1; }
  .c-back-logo .nm { color: var(--nmi-navy-light); }
  .c-back-logo .i  { color: var(--nmi-orange); }
  .c-back-logo .sub { display: block; font-size: 6.5px; font-weight: 600; letter-spacing: 0.1em; color: rgba(244,121,32,0.5); margin-top: 3px; }

  .monte-card.correct .c-back,
  .monte-card.correct .c-face { border-color: #4cde9f; box-shadow: 0 0 0 3px rgba(76,222,159,0.45), 0 8px 32px rgba(0,0,0,0.5); }
  .monte-card.wrong .c-back,
  .monte-card.wrong .c-face   { border-color: #ff5555; box-shadow: 0 0 0 3px rgba(255,85,85,0.45), 0 8px 32px rgba(0,0,0,0.5); }

  /* SHAKE on wrong */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-7px)}
    40%{transform:translateX(7px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
  .monte-card.shake { animation: shake 0.4s ease; }

  /* ACTION BUTTON */
  .action-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 14px 64px; border: none; border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    margin-bottom: 1rem;
  }
  .action-btn.orange { background: var(--nmi-orange); color: var(--nmi-white); box-shadow: 0 4px 24px rgba(244,121,32,0.35); }
  .action-btn.orange:hover:not(:disabled) { background: var(--nmi-orange-light); transform: translateY(-2px); box-shadow: 0 6px 36px rgba(244,121,32,0.5); }
  .action-btn.orange:active:not(:disabled) { transform: scale(0.97); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* SCORE BAR */
  .score-bar {
    display: flex; gap: 2rem;
    margin-bottom: 0.9rem;
    padding: 0.5rem 2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(244,121,32,0.2);
    border-radius: 8px;
  }
  .score-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .score-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; color: var(--nmi-orange); text-transform: uppercase; }
  .score-value { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; color: var(--nmi-white); line-height: 1; }
  .score-divider { width: 1px; background: rgba(244,121,32,0.3); align-self: stretch; }

  .accent-bar { width: 100%; max-width: 700px; height: 3px; background: linear-gradient(90deg, transparent, var(--nmi-orange), transparent); opacity: 0.6; margin-bottom: 0.5rem; }
  footer { font-size: 10px; color: rgba(136,153,187,0.45); letter-spacing: 0.1em; text-align: center; }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(5,12,30,0.9); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s; backdrop-filter: blur(6px);
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--nmi-navy-mid); border-radius: 16px;
    padding: 2.5rem 3rem; text-align: center;
    transform: scale(0.85);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    border: 1px solid rgba(255,255,255,0.08);
    max-width: 390px; width: 92%;
  }
  .overlay.show .modal { transform: scale(1); }
  .modal-icon { font-size: 52px; line-height: 1; margin-bottom: 0.75rem; }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 46px; font-weight: 900; letter-spacing: 0.04em; line-height: 1; margin-bottom: 0.4rem; }
  .modal-title.win  { color: #4cde9f; }
  .modal-title.lose { color: #ff5555; }
  .modal-sub { font-size: 14px; color: var(--nmi-silver); margin-bottom: 1.25rem; line-height: 1.6; }
  .modal-scores {
    display: flex; justify-content: center; gap: 2rem;
    margin-bottom: 1.75rem; padding: 0.875rem;
    background: rgba(255,255,255,0.04);
    border-radius: 8px; border: 1px solid rgba(244,121,32,0.15);
  }
  .modal-score-item { display: flex; flex-direction: column; gap: 2px; }
  .modal-score-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; color: var(--nmi-orange); text-transform: uppercase; }
  .modal-score-val { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 900; color: var(--nmi-white); line-height: 1; }
  .modal-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 12px 44px;
    background: var(--nmi-orange); color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(244,121,32,0.4);
  }
  .modal-btn:hover { background: var(--nmi-orange-light); transform: translateY(-1px); }

  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }

  /* ══ LANDSCAPE ══ */
  @media (orientation: landscape) and (max-height: 500px) {
    body { justify-content: center; }
    .game-wrap {
      flex-direction: row; flex-wrap: nowrap;
      align-items: center; justify-content: center;
      gap: 1.5rem; max-width: 100%;
      padding: 0.4rem 1.5rem;
    }
    .left-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; min-width: 185px; }
    .right-col { display: flex; flex-direction: column; align-items: center; flex: 1 1 auto; min-width: 0; }
    .logo-svg { height: 34px; }
    .booth-label .title { font-size: 16px; }
    .divider-v { height: 24px; }
    .orange-line { width: 34px; margin: 0.25rem 0 0.15rem; }
    .tagline { font-size: 9px; margin-bottom: 0.35rem; }
    .diff-row { margin-bottom: 0.4rem; }
    .diff-pip { width: 8px; height: 8px; }
    .diff-name { font-size: 11px; }
    .score-bar { gap: 1.25rem; padding: 0.35rem 1.25rem; margin-bottom: 0.4rem; }
    .score-value { font-size: 20px; }
    .score-label { font-size: 9px; }
    .phase-strip { margin-bottom: 0.4rem; }
    .phase-step { font-size: 10px; padding: 0.28rem 0.7rem; }
    .phase-num { width: 15px; height: 15px; font-size: 8px; }
    .instruction-banner { font-size: 14px; margin-bottom: 0.5rem; min-height: 20px; }
    .timer-bar-wrap { margin-bottom: 0.4rem; }
    .monte-card { width: 80px !important; height: 114px !important; }
    .c-rank { font-size: 14px; }
    .c-suit-sm { font-size: 10px; }
    .c-suit-lg { font-size: 34px; }
    .c-back-logo { font-size: 16px; }
    .c-back-logo .sub { font-size: 5px; }
    .card-table { height: 130px !important; margin-bottom: 0.6rem; }
    .action-btn { font-size: 17px; padding: 9px 36px; margin-bottom: 0; }
    .accent-bar, footer { display: none; }
    .modal { padding: 1.25rem 1.75rem; max-width: 320px; }
    .modal-icon { font-size: 34px; margin-bottom: 0.4rem; }
    .modal-title { font-size: 32px; }
    .modal-sub { font-size: 11px; margin-bottom: 0.75rem; }
    .modal-scores { margin-bottom: 0.75rem; padding: 0.6rem; gap: 1.25rem; }
    .modal-score-val { font-size: 24px; }
    .modal-btn { padding: 8px 28px; font-size: 14px; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="game-wrap">

  <div class="left-col">
    <div class="logo-area">
      <svg class="logo-svg" viewBox="0 0 160 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="0" y="42" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="46" fill="#1a3a7c">N</text>
        <text x="30" y="42" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="46" fill="#1a3a7c">M</text>
        <text x="68" y="42" font-family="'Barlow Condensed', sans-serif" font-weight="900" font-size="46" fill="#f47920">i</text>
        <text x="0" y="54" font-family="'Barlow', sans-serif" font-weight="500" font-size="7.2" fill="#888" letter-spacing="0.8">TRUSTED CYBERSECURITY LEADER</text>
      </svg>
      <div class="divider-v"></div>
      <div class="booth-label">
        <span class="top">Booth Experience</span>
        <span class="title">Three Card Monte</span>
      </div>
    </div>
    <div class="orange-line"></div>
    <span class="tagline">Find the King — if you can</span>

    <!-- DIFFICULTY -->
    <div class="diff-row">
      <span class="diff-label">Level</span>
      <div class="diff-pip" id="pip1"></div>
      <div class="diff-pip" id="pip2"></div>
      <div class="diff-pip" id="pip3"></div>
      <div class="diff-pip" id="pip4"></div>
      <div class="diff-pip" id="pip5"></div>
      <span class="diff-name" id="diffName">Easy</span>
    </div>

    <div class="score-bar">
      <div class="score-item">
        <span class="score-label">Wins</span>
        <span class="score-value" id="score-wins">0</span>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <span class="score-label">Losses</span>
        <span class="score-value" id="score-losses">0</span>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <span class="score-label">Streak</span>
        <span class="score-value" id="score-streak">0</span>
      </div>
    </div>
  </div>

  <div class="right-col">
    <div class="phase-strip">
      <div class="phase-step active" id="step1"><div class="phase-num">1</div> Memorise</div>
      <div class="phase-sep"></div>
      <div class="phase-step" id="step2"><div class="phase-num">2</div> Shuffle</div>
      <div class="phase-sep"></div>
      <div class="phase-step" id="step3"><div class="phase-num">3</div> Find the King</div>
    </div>

    <div class="instruction-banner" id="instrBanner">
      Memorise the <span>King of Spades ♠</span> position!
    </div>

    <!-- COUNTDOWN BAR (visible only during memorise) -->
    <div class="timer-bar-wrap" id="timerWrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>

    <div class="card-table" id="cardTable"></div>

    <button class="action-btn orange" id="actionBtn" onclick="handleAction()">Shuffle Cards</button>
  </div>

  <div class="accent-bar"></div>
  <footer>NMi &nbsp;·&nbsp; Trusted Cybersecurity Leader &nbsp;·&nbsp; Booth Experience</footer>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-scores">
      <div class="modal-score-item">
        <span class="modal-score-label">Wins</span>
        <span class="modal-score-val" id="modal-wins">0</span>
      </div>
      <div style="width:1px;background:rgba(244,121,32,0.3);"></div>
      <div class="modal-score-item">
        <span class="modal-score-label">Losses</span>
        <span class="modal-score-val" id="modal-losses">0</span>
      </div>
      <div style="width:1px;background:rgba(244,121,32,0.3);"></div>
      <div class="modal-score-item">
        <span class="modal-score-label">Streak</span>
        <span class="modal-score-val" id="modal-streak">0</span>
      </div>
    </div>
    <button class="modal-btn" onclick="startRound()">Play Again</button>
  </div>
</div>

<script>
/* ─────────────────────────────────────
   DIFFICULTY LEVELS
   streak 0-1 → Easy
   streak 2   → Medium
   streak 3   → Hard
   streak 4   → Brutal
   streak 5+  → Insane
───────────────────────────────────── */
const LEVELS = [
  { name:'Easy',   color:'#4cde9f', pips:1, swaps:[7,9],   speedMs:360, memoriseMs:3500, fakeout:false, tripleSwap:false },
  { name:'Medium', color:'#f4c430', pips:2, swaps:[10,13], speedMs:290, memoriseMs:2800, fakeout:false, tripleSwap:false },
  { name:'Hard',   color:'#f47920', pips:3, swaps:[14,17], speedMs:220, memoriseMs:2200, fakeout:true,  tripleSwap:false },
  { name:'Brutal', color:'#ff5555', pips:4, swaps:[18,22], speedMs:160, memoriseMs:1600, fakeout:true,  tripleSwap:true  },
  { name:'Insane', color:'#cc22cc', pips:5, swaps:[24,30], speedMs:115, memoriseMs:1100, fakeout:true,  tripleSwap:true  },
];

const CARDS = [
  { rank:'K', suit:'♠', color:'black', label:'King of Spades' },
  { rank:'7', suit:'♥', color:'red',   label:'7 of Hearts'   },
  { rank:'3', suit:'♣', color:'black', label:'3 of Clubs'    },
];

let positions = [0,1,2]; // positions[slot] = cardIndex
let kingSlot  = 0;
let phase     = 'memorise';
let wins = 0, losses = 0, streak = 0;
let busy = false;
let cardEls = [];
let timerRAF, timerRunning = false;
let autoShuffleTimeout = null;

/* ── HELPERS ── */
function isLandscape() { return window.innerWidth > window.innerHeight && window.innerHeight < 500; }
function cW() { return isLandscape() ? 80 : 120; }
function cH() { return isLandscape() ? 114 : 172; }
function tableH() { return isLandscape() ? 130 : 200; }

function getLevel() {
  return LEVELS[Math.min(streak, LEVELS.length - 1)];
}

function randBetween(a,b) { return a + Math.floor(Math.random()*(b-a+1)); }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

/* ── SLOT X POSITIONS ── */
function slotX(slot) {
  const table = document.getElementById('cardTable');
  const W = table.offsetWidth;
  const gap = isLandscape() ? 18 : 28;
  const total = cW()*3 + gap*2;
  return (W - total)/2 + slot*(cW()+gap);
}

/* ── BUILD TABLE ── */
function buildTable() {
  const table = document.getElementById('cardTable');
  table.style.height = tableH() + 'px';
  table.innerHTML = '';
  cardEls = [];

  for (let slot = 0; slot < 3; slot++) {
    const el = document.createElement('div');
    el.className = 'monte-card';
    el.dataset.slot = slot;
    el.style.width  = cW() + 'px';
    el.style.height = cH() + 'px';
    el.style.top    = (tableH()/2 - cH()/2) + 'px';
    el.style.left   = slotX(slot) + 'px';
    el.style.transition = 'top 0.12s, left 0.12s';

    const card = CARDS[positions[slot]];
    el.innerHTML = `
      <div class="card-inner-3d">
        <div class="c-face ${card.color}">
          <div class="c-corner"><span class="c-rank">${card.rank}</span><span class="c-suit-sm">${card.suit}</span></div>
          <div class="c-center"><span class="c-suit-lg">${card.suit}</span></div>
          <div class="c-corner c-corner-b"><span class="c-rank">${card.rank}</span><span class="c-suit-sm">${card.suit}</span></div>
        </div>
        <div class="c-back">
          <div class="c-back-inner">
            <div class="c-back-logo"><span class="nm">NM</span><span class="i">i</span><span class="sub">CYBERSECURITY</span></div>
          </div>
        </div>
      </div>`;

    table.appendChild(el);
    cardEls.push(el);
  }
}

/* ── FLIP HELPERS ── */
function setAllFaceUp(on) {
  for (const el of cardEls) {
    if (on) el.classList.add('flipped');
    else    el.classList.remove('flipped');
  }
}

/* ── SWAP ANIMATION ── */
async function swapSlots(a, b, speedMs) {
  const elA = cardEls[a];
  const elB = cardEls[b];
  const xA  = slotX(a);
  const xB  = slotX(b);
  const midY = tableH()/2 - cH()/2;
  const liftY = midY - (isLandscape() ? 20 : 32);
  const half  = speedMs * 0.5;
  const third = speedMs * 0.33;

  // lift
  elA.style.transition = `top ${third}ms ease`;
  elB.style.transition = `top ${third}ms ease`;
  elA.style.top = liftY + 'px';
  elB.style.top = liftY + 'px';
  await delay(third);

  // slide
  elA.style.transition = `left ${half}ms cubic-bezier(0.4,0,0.2,1)`;
  elB.style.transition = `left ${half}ms cubic-bezier(0.4,0,0.2,1)`;
  elA.style.left = xB + 'px';
  elB.style.left = xA + 'px';
  await delay(half);

  // drop
  elA.style.transition = `top ${third}ms ease`;
  elB.style.transition = `top ${third}ms ease`;
  elA.style.top = midY + 'px';
  elB.style.top = midY + 'px';
  await delay(third);

  // update state
  [cardEls[a], cardEls[b]] = [cardEls[b], cardEls[a]];
  [positions[a], positions[b]] = [positions[b], positions[a]];
  if (positions[a]===0) kingSlot = a;
  if (positions[b]===0) kingSlot = b;
}

/* ── THREE-WAY ROTATION ── */
async function tripleRotate(speedMs) {
  // 0→1→2→0
  const dir = Math.random() < 0.5 ? [0,1,2] : [2,1,0];
  const [a,b,c] = dir;
  const xA = slotX(a), xB = slotX(b), xC = slotX(c);
  const elA = cardEls[a], elB = cardEls[b], elC = cardEls[c];
  const midY = tableH()/2 - cH()/2;
  const liftY = midY - (isLandscape() ? 20 : 32);
  const half  = speedMs * 0.55;
  const third = speedMs * 0.3;

  elA.style.transition = `top ${third}ms ease`;
  elB.style.transition = `top ${third}ms ease`;
  elC.style.transition = `top ${third}ms ease`;
  elA.style.top = liftY + 'px';
  elB.style.top = liftY + 'px';
  elC.style.top = liftY + 'px';
  await delay(third);

  elA.style.transition = `left ${half}ms cubic-bezier(0.4,0,0.2,1)`;
  elB.style.transition = `left ${half}ms cubic-bezier(0.4,0,0.2,1)`;
  elC.style.transition = `left ${half}ms cubic-bezier(0.4,0,0.2,1)`;
  elA.style.left = xB + 'px';
  elB.style.left = xC + 'px';
  elC.style.left = xA + 'px';
  await delay(half);

  elA.style.transition = `top ${third}ms ease`;
  elB.style.transition = `top ${third}ms ease`;
  elC.style.transition = `top ${third}ms ease`;
  elA.style.top = midY + 'px';
  elB.style.top = midY + 'px';
  elC.style.top = midY + 'px';
  await delay(third);

  // update state: a→b slot, b→c slot, c→a slot
  const oldA = positions[a], oldB = positions[b], oldC = positions[c];
  const oldElA = cardEls[a], oldElB = cardEls[b], oldElC = cardEls[c];
  cardEls[b]    = oldElA;
  cardEls[c]    = oldElB;
  cardEls[a]    = oldElC;
  positions[b]  = oldA;
  positions[c]  = oldB;
  positions[a]  = oldC;
  if (positions[a]===0) kingSlot=a;
  if (positions[b]===0) kingSlot=b;
  if (positions[c]===0) kingSlot=c;
}

/* ── FAKEOUT: start swap, pause mid-air, then reverse or proceed ── */
async function fakeSwap(speedMs) {
  const a = Math.floor(Math.random()*3);
  let b; do { b=Math.floor(Math.random()*3); } while(b===a);

  const elA = cardEls[a], elB = cardEls[b];
  const xA = slotX(a), xB = slotX(b);
  const midX = (xA+xB)/2;
  const midY = tableH()/2 - cH()/2;
  const liftY = midY - (isLandscape() ? 20 : 32);
  const sp = speedMs * 0.7;
  const third = sp * 0.3;

  // lift
  elA.style.transition = `top ${third}ms ease`;
  elB.style.transition = `top ${third}ms ease`;
  elA.style.top = liftY + 'px';
  elB.style.top = liftY + 'px';
  await delay(third);

  // move PARTWAY only
  elA.style.transition = `left ${sp*0.4}ms cubic-bezier(0.4,0,0.2,1)`;
  elB.style.transition = `left ${sp*0.4}ms cubic-bezier(0.4,0,0.2,1)`;
  elA.style.left = (xA + (xB-xA)*0.45) + 'px';
  elB.style.left = (xB + (xA-xB)*0.45) + 'px';
  await delay(sp*0.4);

  // pause — creates confusion
  await delay(60);

  // snap BACK
  elA.style.transition = `left ${sp*0.35}ms cubic-bezier(0.4,0,0.2,1)`;
  elB.style.transition = `left ${sp*0.35}ms cubic-bezier(0.4,0,0.2,1)`;
  elA.style.left = xA + 'px';
  elB.style.left = xB + 'px';
  await delay(sp*0.35);

  // drop
  elA.style.transition = `top ${third}ms ease`;
  elB.style.transition = `top ${third}ms ease`;
  elA.style.top = midY + 'px';
  elB.style.top = midY + 'px';
  await delay(third);
  // no position state change — it was a fake!
}

/* ── MAIN SHUFFLE SEQUENCE ── */
async function runShuffle() {
  busy = true;
  document.getElementById('actionBtn').disabled = true;

  const lvl = getLevel();
  const totalSwaps = randBetween(lvl.swaps[0], lvl.swaps[1]);
  let performed = 0;

  while (performed < totalSwaps) {
    // Insert fakeout occasionally at Hard+
    if (lvl.fakeout && performed > 0 && Math.random() < 0.28) {
      await fakeSwap(lvl.speedMs);
      await delay(30);
      continue; // doesn't count as a real swap
    }

    // Triple rotate at Brutal+
    if (lvl.tripleSwap && Math.random() < 0.35) {
      await tripleRotate(lvl.speedMs);
      performed += 2; // counts as 2
      await delay(30);
      continue;
    }

    // Normal swap
    let a = Math.floor(Math.random()*3);
    let b; do { b=Math.floor(Math.random()*3); } while(b===a);
    await swapSlots(a, b, lvl.speedMs);
    performed++;

    // Tiny gap between moves (smaller = harder to track)
    const gap = Math.max(0, 80 - streak * 10);
    if (gap > 0) await delay(gap);
  }

  busy = false;
  enterPickPhase();
}

/* ── TIMER BAR ── */
function startTimer(durationMs) {
  stopTimer();
  const wrap = document.getElementById('timerWrap');
  const bar  = document.getElementById('timerBar');
  wrap.classList.add('visible');
  bar.style.transition = 'none';
  bar.style.transform = 'scaleX(1)';
  bar.style.background = 'var(--nmi-orange)';

  const start = performance.now();
  timerRunning = true;

  function tick(now) {
    if (!timerRunning) return;
    const elapsed = now - start;
    const pct = Math.max(0, 1 - elapsed/durationMs);
    bar.style.transition = 'transform 0.08s linear';
    bar.style.transform = `scaleX(${pct})`;
    if (pct < 0.35) bar.style.background = '#ff5555';
    else if (pct < 0.6) bar.style.background = '#f4c430';
    if (elapsed < durationMs) {
      timerRAF = requestAnimationFrame(tick);
    } else {
      // Auto-shuffle when timer runs out
      if (phase === 'memorise') {
        document.getElementById('instrBanner').innerHTML = 'Time\'s up! Watch carefully...';
        setTimeout(() => enterShufflePhase(), 200);
      }
    }
  }
  timerRAF = requestAnimationFrame(tick);
}

function stopTimer() {
  timerRunning = false;
  cancelAnimationFrame(timerRAF);
  const wrap = document.getElementById('timerWrap');
  const bar  = document.getElementById('timerBar');
  wrap.classList.remove('visible');
  bar.style.transform = 'scaleX(1)';
  bar.style.background = 'var(--nmi-orange)';
}

/* ── DIFFICULTY UI ── */
function updateDiffUI() {
  const lvl = getLevel();
  for (let i=1;i<=5;i++) {
    const pip = document.getElementById('pip'+i);
    pip.className = 'diff-pip';
    if (i<=lvl.pips) pip.classList.add('lit-'+i);
  }
  const nameEl = document.getElementById('diffName');
  nameEl.textContent = lvl.name;
  nameEl.style.color = lvl.color;
}

/* ── PHASES ── */
function setPhase(name) {
  phase = name;
  const map = {memorise:0, shuffle:1, pick:2, done:2};
  ['step1','step2','step3'].forEach((id,i)=>{
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if (i < map[name])       el.classList.add('done');
    else if (i === map[name]) el.classList.add('active');
  });
}

function enterMemorisePhase() {
  setPhase('memorise');
  setAllFaceUp(true);
  updateDiffUI();
  const lvl = getLevel();
  document.getElementById('instrBanner').innerHTML =
    `Memorise the <span>King of Spades ♠</span>! <span class="warn">${(lvl.memoriseMs/1000).toFixed(1)}s</span>`;
  const btn = document.getElementById('actionBtn');
  btn.textContent = 'Shuffle Now';
  btn.disabled = false;
  startTimer(lvl.memoriseMs);
}

function enterShufflePhase() {
  if (phase !== 'memorise') return;
  clearTimeout(autoShuffleTimeout);
  stopTimer();
  setPhase('shuffle');
  setAllFaceUp(false);
  document.getElementById('instrBanner').innerHTML = 'Watch closely...';
  document.getElementById('actionBtn').disabled = true;
  setTimeout(() => runShuffle(), 280);
}

function enterPickPhase() {
  setPhase('pick');
  const lvl = getLevel();
  // Harder levels: no hint, just "pick"
  document.getElementById('instrBanner').innerHTML =
    streak >= 3
      ? 'Where is the <span>King</span>? Pick now!'
      : 'Where is the <span>King of Spades ♠</span>?';
  for (let slot=0; slot<3; slot++) {
    cardEls[slot].classList.add('clickable');
    cardEls[slot].onclick = () => pickCard(slot);
  }
  document.getElementById('actionBtn').disabled = true;
}

/* ── PICK ── */
async function pickCard(slot) {
  if (phase !== 'pick' || busy) return;
  busy = true;
  phase = 'done';
  for (const el of cardEls) { el.classList.remove('clickable'); el.onclick = null; }

  const isWin = slot === kingSlot;
  cardEls[slot].classList.add('flipped');
  await delay(300);
  setAllFaceUp(true);
  await delay(480);

  cardEls[kingSlot].classList.add('correct');
  if (!isWin) {
    cardEls[slot].classList.add('wrong');
    cardEls[slot].classList.add('shake');
  }

  if (isWin) { wins++; streak++; launchConfetti(); }
  else { losses++; streak = 0; }

  updateScores();
  await delay(950);
  showModal(isWin);
  busy = false;
}

function updateScores() {
  document.getElementById('score-wins').textContent    = wins;
  document.getElementById('score-losses').textContent  = losses;
  document.getElementById('score-streak').textContent  = streak;
}

/* ── MODAL ── */
function showModal(isWin) {
  const lvl = getLevel();
  document.getElementById('modal-icon').textContent = isWin ? '🎉' : '🃏';
  document.getElementById('modal-title').textContent = isWin ? 'WINNER!' : 'Wrong Card!';
  document.getElementById('modal-title').className = 'modal-title '+(isWin?'win':'lose');

  let sub = isWin
    ? `You found the King on <strong>${LEVELS[Math.min(streak-1,LEVELS.length-1)].name}</strong> difficulty!`
    : `The King slipped away! Next round: <strong>${lvl.name}</strong>.`;
  document.getElementById('modal-sub').innerHTML = sub;
  document.getElementById('modal-wins').textContent   = wins;
  document.getElementById('modal-losses').textContent = losses;
  document.getElementById('modal-streak').textContent = streak;
  document.getElementById('overlay').classList.add('show');
  if (!isWin) stopConfetti();
}

/* ── START ROUND ── */
function startRound() {
  document.getElementById('overlay').classList.remove('show');
  stopConfetti();
  stopTimer();
  clearTimeout(autoShuffleTimeout);

  // Randomise starting layout
  const arr = [0,1,2];
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  positions = arr;
  kingSlot  = positions.indexOf(0);

  buildTable();
  enterMemorisePhase();
}

function handleAction() {
  if (phase === 'memorise') enterShufflePhase();
}

/* ── CONFETTI ── */
const canvas = document.getElementById('confetti-canvas');
const ctx    = canvas.getContext('2d');
let confettiPieces=[], confettiRunning=false, confettiRAF2;
const CCOLORS=['#f47920','#ff9a45','#4cde9f','#ffffff','#1a3a7c','#ffcc44','#ff5599'];

function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function rb(a,b){ return a+Math.random()*(b-a); }

function launchConfetti(){
  confettiPieces=[]; confettiRunning=true;
  for(let i=0;i<150;i++){
    confettiPieces.push({
      x:rb(canvas.width*0.15,canvas.width*0.85), y:rb(-120,-5),
      w:rb(7,14), h:rb(4,9),
      color:CCOLORS[Math.floor(Math.random()*CCOLORS.length)],
      vx:rb(-4,4), vy:rb(3,9),
      angle:rb(0,360), spin:rb(-5,5), opacity:1
    });
  }
  animateConfetti();
}

function animateConfetti(){
  if(!confettiRunning) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let alive=false;
  for(const p of confettiPieces){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.angle+=p.spin;
    if(p.y>canvas.height*0.72) p.opacity-=0.022;
    if(p.opacity>0){
      alive=true;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.opacity);
      ctx.translate(p.x,p.y); ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
  }
  if(alive) confettiRAF2=requestAnimationFrame(animateConfetti);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}

function stopConfetti(){
  confettiRunning=false; cancelAnimationFrame(confettiRAF2);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ── INIT ──
startRound();
</script>
